        .joy-center { background: linear-gradient(180deg, #3a0a3a, #1a001a); border: 2px solid #5a205a; border-radius: 50%; font-size: 0.55em; color: #a080a0; display: flex; align-items: center; justify-content: center; }
        .joy-empty { background: transparent; border: none; }
        .menu-buttons { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-top: 4px; }
        .menu-btn { background: linear-gradient(180deg, #5a1a5a, #2a0a2a); color: #e0c0e0; border: 1px solid #8a408a; border-radius: 18px; padding: 6px 10px; font-size: 0.7em; cursor: pointer; transition: all 0.2s; }

        .save-slot-btn:hover { border-color: #a060a0; }
        input[type="text"] { background: #1a001a; border: 1px solid #6a306a; border-radius: 6px; color: #d0b0d0; padding: 5px; font-size: 0.7em; width: 100%; margin: 2px 0; text-align: center; }
        .fav-btn-row { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; }
        .tiny-btn { background: linear-gradient(180deg, #4a3a00, #2a1a00); color: #ffffff; border: 1px solid #8a6a20; border-radius: 10px; padding: 4px 8px; font-size: 0.6em; cursor: pointer; font-weight: bold; }
        .tiny-btn:hover { border-color: #c0a040; }
    </style>
</head>

            l+=canFightBoss()?'<button class="circle-icon" onclick="chooseBoss()"><img src="'+IMG.iconBoss+'" alt="Боссы"></button>':'<button class="circle-icon locked"><img src="'+IMG.iconBoss+'" alt="Боссы"></button>';
            l+='</div>';
            let r='<div class="side-icons">';
            r+='<button class="circle-icon" onclick="chooseRel()"><img src="'+IMG.iconRel+'" alt="Отношения"></button>';
            r+='<button class="circle-icon" onclick="shop()"><img src="'+IMG.iconShop+'" alt="Магазин"></button>';
            r+='<button class="circle-icon" onclick="openChest()"><img src="'+IMG.iconKey+'" alt="Ключи"></button>';
            r+='</div>';
            let c='<div class="center-area">'+(player.favorite&&bossImages[player.favorite]?'<div class="fav-label">⭐ '+player.favorite+' ⭐</div><div class="fav-portrait-large"><img src="'+bossImages[player.favorite]+'" alt=""></div><div class="fav-btn-row"><button class="tiny-btn" onclick="setFav()">🔄</button></div>':'<div class="fav-empty">⭐<br>ПОБЕДИ БОССА</div>')+'</div>';
            setButtonsHTML('<div class="main-layout">'+l+c+r+'</div><div class="menu-buttons"><button class="menu-btn" onclick="saveMenu()">💾</button><button class="menu-btn" onclick="loadMenu()">📂</button><button class="menu-btn" onclick="stats()">📊</button><button class="menu-btn" onclick="newGameConfirm()">🆕</button></div>');}

        function showMap(){clearJoystick();let h='<div class="map-overlay"><div class="map-title">🗺️ КАРТА</div>';h+='<div class="map-section-label">Боссы (21-30)</div>';for(let i=30;i>=21;i--){let d=i<=player.level;h+='<div class="map-level-row"><div class="map-level-num'+(d?' done':'')+'">'+i+'</div><div class="map-level-info">'+(d?'✅':'🔒')+'</div></div>';}h+='<div class="map-section-label">Элита (11-20)</div>';for(let i=20;i>=11;i--){let d=i<=player.level;h+='<div class="map-level-row"><div class="map-level-num'+(d?' done':'')+'">'+i+'</div><div class="map-level-info">'+(d?'✅':'🔒')+'</div></div>';}h+='<div class="map-section-label">Монстры (1-10)</div>';for(let i=10;i>=1;i--){let d=i<=player.level;h+='<div class="map-level-row"><div class="map-level-num'+(d?' done':'')+'">'+i+'</div><div class="map-level-info">'+(d?'✅':'🔒')+'</div></div>';}h+='<button class="menu-btn" style="margin:8px 0;" onclick="mainMenu()">Назад</button></div>';setButtonsHTML(h);setTimeout(()=>{let o=document.querySelector('.map-overlay');if(o)o.scrollTop=o.scrollHeight;},100);}

        function showBook(){clearJoystick();let h='<div class="book-overlay"><div style="color:#c080c0;font-size:1em;">📖 БЕСТИАРИЙ</div>';h+='<div class="map-section-label">Монстры</div>';monsterData.forEach(m=>{let k=defeatedMonsters.includes(m.name);h+='<div class="book-entry'+(k?'':' locked')+'"><img src="'+m.img+'" class="book-img" onerror="this.style.display=\'none\'"><div class="book-info"><h4>'+(k?m.name:'???')+'</h4>'+(k?'HP:'+m.hp+' | Атк:'+m.atk+'<br>'+m.desc:'Победите')+'</div></div>';});h+='<div class="map-section-label">Элита</div>';eliteData.forEach(m=>{let k=defeatedElites.includes(m.name);h+='<div class="book-entry'+(k?'':' locked')+'"><img src="'+m.img+'" class="book-img" onerror="this.style.display=\'none\'"><div class="book-info"><h4>'+(k?m.name:'???')+'</h4>'+(k?'HP:'+m.hp+' | Атк:'+m.atk+'<br>'+m.desc:'Победите')+'</div></div>';});h+='<div class="map-section-label">Боссы</div>';for(let n in bossData){let m=bossData[n],k=defeatedBosses.includes(n);h+='<div class="book-entry'+(k?'':' locked')+'"><img src="'+m.img+'" class="book-img" onerror="this.style.display=\'none\'"><div class="book-info"><h4>'+(k?n:'???')+'</h4>'+(k?'HP:'+m.hp+' | Атк:'+m.atk+'<br>'+m.desc:'Победите')+'</div></div>';}h+='<button class="menu-btn" style="margin:8px 0;" onclick="mainMenu()">Назад</button></div>';setButtonsHTML(h);}

        function setFav(){let c=player.conquered;if(c.length===0)return;let b=c.map(x=>({text:x,action:()=>{player.favorite=x;mainMenu();}}));b.push({text:'Убрать',action:()=>{player.favorite=null;mainMenu();}});setText('Выбери:');setButtons(b);}

        function startBattle(n,hp,atk,type,kch,cr,img){hideEnemyBar();hidePortrait();enemyName=n;enemyHp=hp;enemyMaxHp=hp;enemyAttack=atk;battleType=type;keyChance=kch||0;updateEnemyBar();if(img)showImg(img);setBg(type==='boss'?n:(type==='elite'?'elite':'monster'));setText((type==='boss'?'👑 ':(type==='elite'?'💀 ':'⚔️ '))+n);joy(cr);}
        function startMonster(){let m=monsterData[Math.floor(Math.random()*4)];startBattle(m.name,m.hp,m.atk,'monster',0,m.coins,m.img);}
        function startElite(){if(!canFightElite()){setText('🔒 11 ур.');setButtons([{text:'Назад',action:mainMenu}]);return;}let m=eliteData[Math.floor(Math.random()*4)];startBattle(m.name,m.hp,m.atk,'elite',m.keyChance,m.coins,m.img);}
        function joy(cr){updateUI();updateEnemyBar();let h='<div class="joystick-container"><div class="joy-empty"></div><button class="joy-btn" onclick="atk('+cr+')">⚔️</button><div class="joy-empty"></div>';h+='<button class="joy-btn" onclick="satk('+cr+')">💥</button><div class="joy-center">🛡️</div><button class="joy-btn" onclick="flee()">🏃</button>';h+='<div class="joy-empty"></div><button class="joy-btn" onclick="def('+cr+')">🛡️</button><div class="joy-empty"></div></div>';document.getElementById('joystickArea').innerHTML=h;document.getElementById('buttons').innerHTML='';}
        function atk(cr){let d=Math.max(1,player.attack+rand(-3,5));enemyHp-=d;addText('⚔️ -'+d);updateEnemyBar();if(enemyHp<=0){win(cr);return;}eturn(cr);}
        function satk(cr){if(chance(0.7)){let d=Math.max(1,player.attack*2);enemyHp-=d;addText('💥 -'+d);}else{addText('💨 Промах!');}updateEnemyBar();if(enemyHp<=0){win(cr);return;}eturn(cr);}
        function def(cr){player.defense+=5;addText('🛡️ +5');eturn(cr);}
        function flee(){if(chance(0.5)){addText('🏃 Сбежал!');clearJoystick();hideEnemyBar();hidePortrait();enemyHp=0;mainMenu();}else{addText('Не вышло!');eturn(0);}}
        function eturn(cr){let d=Math.max(1,enemyAttack+rand(-2,4)-player.defense);player.hp-=d;addText('💢 '+enemyName+' -'+d);updateUI();if(player.hp<=0){player.hp=Math.floor(player.maxHp/2);addText('💀 Поражение...');clearJoystick();hideEnemyBar();hidePortrait();enemyHp=0;mainMenu();return;}joy(cr);}
        function win(cr){addText('🎉 ПОБЕДА!');addWin();if(cr>0){player.coins+=cr;addText('💰 +'+cr);}if(battleType==='monster'&&!defeatedMonsters.includes(enemyName))defeatedMonsters.push(enemyName);if(battleType==='elite'&&!defeatedElites.includes(enemyName))defeatedElites.push(enemyName);if(battleType==='boss'&&!defeatedBosses.includes(enemyName))defeatedBosses.push(enemyName);if(battleType==='elite'&&chance(keyChance)&&player.cards.length<3){player.keys++;addText('✨ КЛЮЧ! Всего:'+player.keys);}clearJoystick();hideEnemyBar();if(battleType!=='boss')hidePortrait();enemyHp=0;updateUI();setButtons([{text:'Продолжить',action:mainMenu}]);}

        function openChest(){clearJoystick();if(player.keys<=0){setText('Нет ключей!');setButtons([{text:'Назад',action:mainMenu}]);return;}player.keys--;let av=['Кайрос','Зейн','Люциан'].filter(b=>!player.cards.includes(b));if(av.length===0){player.keys++;setText('Все карты есть!');setButtons([{text:'Назад',action:mainMenu}]);return;}let obt=av[Math.floor(Math.random()*av.length)];player.cards.push(obt);showImg(bossImages[obt]);setBg(obt);setText('🗝️ Сундук!<br>🎴 '+obt+'!');updateUI();setButtons([{text:'OK',action:mainMenu}]);}

        function chooseBoss(){clearJoystick();if(!canFightBoss()){setText('🔒 21 ур.');setButtons([{text:'Назад',action:mainMenu}]);return;}let avail=player.cards.filter(b=>!bosses[b].defeated);if(avail.length===0){setText('Все боссы побеждены!');setButtons([{text:'Назад',action:mainMenu}]);return;}let btns=avail.map(x=>({text:x,action:()=>bossBattle(x)}));btns.push({text:'Назад',action:mainMenu});setText('Выбери:');setButtons(btns);}
        function bossBattle(n){currentBoss=n;player.hp=player.maxHp;bossPhase=1;let d=bossData[n];enemyName=n;enemyHp=d.hp;enemyMaxHp=d.hp;enemyAttack=d.atk;phaseThreshold=Math.floor(d.hp*0.5);battleType='boss';setBg(n);showImg(d.img);updateEnemyBar();setText('👑 '+n);bossJoy();}
        function bossJoy(){updateUI();updateEnemyBar();let h='<div class="joystick-container"><div class="joy-empty"></div><button class="joy-btn" onclick="bAtk()">⚔️</button><div class="joy-empty"></div>';h+='<button class="joy-btn" onclick="bAtk()">⚔️</button><div class="joy-center">👑</div><button class="joy-btn" onclick="bHeal()">💚</button>';h+='<div class="joy-empty"></div><button class="joy-btn" onclick="bDodge()">💨</button><div class="joy-empty"></div></div>';document.getElementById('joystickArea').innerHTML=h;document.getElementById('buttons').innerHTML='';}
        function bAtk(){let d=Math.max(1,player.attack+rand(-5,8));enemyHp-=d;addText('⚔️ -'+d);updateEnemyBar();if(enemyHp<=0){bWin();return;}bTurn();}
        function bDodge(){if(chance(0.6)){let d=Math.max(1,Math.floor(player.attack*1.5));enemyHp-=d;addText('💨 -'+d);}else{addText('Не вышло!');}updateEnemyBar();if(enemyHp<=0){bWin();return;}bTurn();}
        function bHeal(){player.hp=Math.min(player.maxHp,player.hp+25);addText('💚 +25');updateUI();bTurn();}
        function bTurn(){let d=Math.max(1,enemyAttack+rand(-5,15)-player.defense);player.hp-=d;addText('💢 '+currentBoss+' -'+d);updateUI();if(enemyHp<=phaseThreshold&&bossPhase===1){bossPhase=2;enemyAttack+=15;addText('⚡ Ярость!');}if(player.hp<=0){player.hp=Math.floor(player.maxHp/2);addText('💀 Поражение...');clearJoystick();hideEnemyBar();hidePortrait();enemyHp=0;mainMenu();return;}bossJoy();}
        function bWin(){addText('🎉 ПОБЕДА!');bosses[currentBoss].defeated=true;if(!player.conquered.includes(currentBoss))player.conquered.push(currentBoss);if(!player.favorite)player.favorite=currentBoss;if(!defeatedBosses.includes(currentBoss))defeatedBosses.push(currentBoss);addWin();player.coins+=80;addText('+80💰');clearJoystick();hideEnemyBar();enemyHp=0;updateUI();setButtons([{text:'Продолжить',action:mainMenu}]);}

        function chooseRel(){clearJoystick();if(player.conquered.length===0){setText('Победи босса!');setButtons([{text:'Назад',action:mainMenu}]);return;}let b=player.conquered.map(x=>({text:x+' (ур.'+Math.min(5,Math.floor(bosses[x].rel/100)+1)+')',action:()=>relMenu(x)}));b.push({text:'Назад',action:mainMenu});setText('💕 Отношения:');setButtons(b);}
        function relMenu(n){clearJoystick();setBg(n);showImg(bossImages[n]);let b=bosses[n],lvl=Math.min(5,Math.floor(b.rel/100)+1);let msg='💕 '+n+' | Ур.'+lvl+'/5 | '+b.rel+'/'+(lvl*100);if(b.rel>=500)msg+='\n❤️ Макс!';setText(msg);updateUI();let btns=[];btns.push({text:'💬 Поговорить (30💰, +5)',action:()=>relAct(n,'talk')});btns.push({text:'🤝 Прикоснуться (50💰, +10)',action:()=>relAct(n,'touch')});btns.push({text:'🎁 Подарок (80💰, +20)',action:()=>relGift(n)});if(lvl>=4&&b.dateCount<2)btns.push({text:'💖 Свидание (150💰, +50)',action:()=>relDate(n)});if(b.rel>=500&&b.dateCount>=2)btns.push({text:'🌙 Интимная сцена',action:()=>relFinal(n)});if(player.favorite===n){btns.push({text:'💔 Убрать из избранного',action:()=>{player.favorite=null;setText('💔 '+n+' больше не избранный.');updateUI();setButtons([{text:'OK',action:()=>relMenu(n)}]);}});}else{btns.push({text:'❤️ В избранное',action:()=>{player.favorite=n;setText('❤️ '+n+' теперь избранный!');updateUI();setButtons([{text:'OK',action:()=>relMenu(n)}]);}});}btns.push({text:'Назад',action:chooseRel});setButtons(btns);}
        function relAct(n,t){let c={talk:30,touch:50},g={talk:5,touch:10};if(player.coins<c[t]){setText('Нужно '+c[t]+'💰!');setButtons([{text:'Назад',action:()=>relMenu(n)}]);return;}player.coins-=c[t];bosses[n].rel=Math.min(500,bosses[n].rel+g[t]);setText((t==='talk'?'Вы поговорили.':'Ты коснулся его.')+' +'+g[t]+' (-'+c[t]+'💰)');updateUI();setButtons([{text:'OK',action:()=>relMenu(n)}]);}
        function relGift(n){clearJoystick();if(player.coins<80){setText('Нужно 80💰!');setButtons([{text:'Назад',action:()=>relMenu(n)}]);return;}let g=giftData[n],ph=giftPlaceholders[n];let h='🎁 ВЫБЕРИ ПОДАРОК<br><br>';h+='<div style="display:flex;justify-content:center;gap:20px;flex-wrap:wrap;">';h+='<div style="text-align:center;"><div class="gift-card"><img src="'+g[0].img+'" onerror="this.parentElement.innerHTML=\'<div class=gift-placeholder><span class=icon>'+ph[0][0]+'</span>'+ph[0][1]+'</div>\'"></div><br>'+g[0].name+'<br><button class="menu-btn" onclick="relGiftOk(\''+n+'\',0)">Выбрать</button></div>';h+='<div style="text-align:center;"><div class="gift-card"><img src="'+g[1].img+'" onerror="this.parentElement.innerHTML=\'<div class=gift-placeholder><span class=icon>'+ph[1][0]+'</span>'+ph[1][1]+'</div>\'"></div><br>'+g[1].name+'<br><button class="menu-btn" onclick="relGiftOk(\''+n+'\',1)">Выбрать</button></div>';h+='</div><br><button class="menu-btn" onclick="relMenu(\''+n+'\')">Назад</button>';setText(h);setButtonsHTML('');}
        function relGiftOk(n,idx){player.coins-=80;bosses[n].rel=Math.min(500,bosses[n].rel+20);let g=giftData[n][idx],ph=giftPlaceholders[n][idx];let h='🎁 Подарок вручён!<br><br><div class="gift-ok-card"><img src="'+g.img+'" onerror="this.innerHTML=\'<div class=gift-placeholder style=width:160px;height:160px><span class=icon style=font-size:3em>'+ph[0]+'</span>'+ph[1]+'</div>\'"></div><br>'+g.name+'<br><br>+20 очков! (-80💰)';setText(h);updateUI();setButtons([{text:'OK',action:()=>relMenu(n)}]);}
        function relDate(n){if(player.coins<150){setText('Нужно 150💰!');setButtons([{text:'Назад',action:()=>relMenu(n)}]);return;}player.coins-=150;bosses[n].rel=Math.min(500,bosses[n].rel+50);bosses[n].dateCount++;let d=dates[n][bosses[n].dateCount];setBg(n);showImg(d.img);setText('💖 СВИДАНИЕ #'+bosses[n].dateCount+'\n\n'+d.t+'\n\n+50 очков!');updateUI();setButtons([{text:'Прекрасно...',action:()=>relMenu(n)}]);}
        function relFinal(n){setBg(n);showImg(bossImages[n]);setText('🌙 БЛИЗОСТЬ\n\n'+finalScenes[n]);setButtons([{text:'❤️',action:()=>relMenu(n)}]);}

        function shop(){clearJoystick();setBg('menu');setText('🏪 | 💰'+player.coins);setButtons([{text:'🧪 +50 HP (80💰)',action:()=>{if(player.coins>=80){player.coins-=80;player.hp=Math.min(player.maxHp,player.hp+50);}shop();}},{text:'⚗️ +10 Атк (120💰)',action:()=>{if(player.coins>=120){player.coins-=120;player.attack+=10;}shop();}},{text:'Назад',action:mainMenu}]);}
        function stats(){clearJoystick();setBg('menu');let m='📊 СТАТЫ\nУр.'+player.level+' | HP:'+player.maxHp+' | Атк:'+player.attack+' | Защ:'+player.defense+'\n💰'+player.coins+' | 🔑'+player.keys+'\n\n';if(player.conquered.length>0){m+='👑 БОССЫ:\n';player.conquered.forEach(b=>{let bi=bossData[b];m+=b+': '+bi.desc+'\nСпособность: '+bi.ability+'\nЛюбит: '+bi.likes+'\nОтношения: '+bosses[b].rel+'/500\n\n';});}setText(m);setButtons([{text:'Назад',action:mainMenu}]);}

        function getSaves(){let s=localStorage.getItem('blFantasySaves');return s?JSON.parse(s):{};}
        function saveSaves(s){localStorage.setItem('blFantasySaves',JSON.stringify(s));}
        function saveMenu(){clearJoystick();let s=getSaves(),h='💾 СОХРАНИТЬ<br><br>';for(let i=1;i<=3;i++)h+='<button class="save-slot-btn" onclick="saveSlot('+i+')">Слот '+i+': '+(s['slot'+i]?s['slot'+i].name:'Пусто')+'</button>';h+='<br><button class="menu-btn" onclick="mainMenu()">Назад</button>';setText(h);setButtonsHTML('');}
        function saveSlot(n){let nm=prompt('Название:','Слот '+n);if(!nm)return;let s=getSaves();s['slot'+n]={name:nm,player:JSON.parse(JSON.stringify(player)),bosses:JSON.parse(JSON.stringify(bosses)),dM:[...defeatedMonsters],dE:[...defeatedElites],dB:[...defeatedBosses]};saveSaves(s);setText('💾 '+nm);setButtons([{text:'OK',action:mainMenu}]);}
        function loadMenu(){clearJoystick();let s=getSaves(),h='📂 ЗАГРУЗИТЬ<br><br>',a=false;for(let i=1;i<=3;i++){if(s['slot'+i]){a=true;h+='<button class="save-slot-btn" onclick="loadSlot('+i+')">Слот '+i+': '+s['slot'+i].name+'</button>';}else h+='<div class="save-slot-btn" style="color:#504050;">Слот '+i+': Пусто</div>';}if(!a)h+='<br>Нет сохранений!';h+='<br><button class="menu-btn" onclick="mainMenu()">Назад</button>';setText(h);setButtonsHTML('');}
        function loadSlot(n){let s=getSaves()['slot'+n];if(!s)return;player=s.player;bosses=s.bosses;defeatedMonsters=s.dM||[];defeatedElites=s.dE||[];defeatedBosses=s.dB||[];player.introDone=true;setText('📂 '+s.name);updateUI();setButtons([{text:'Играть',action:mainMenu}]);}
        function newGameConfirm(){clearJoystick();setText('⚠️ Начать новую игру?');setButtons([{text:'✅ Да',action:newGame},{text:'❌ Нет',action:mainMenu}]);}

        function start(){clearJoystick();let s=getSaves(),has=Object.keys(s).length>0;setBg('menu');updateUI();if(has){setText('📂 Сохранения найдены.');setButtons([{text:'📂 Загрузить',action:loadMenu},{text:'🆕 Новая',action:newGameConfirm}]);}else{setText('🔥 BL ФЕНТЕЗИ 🔥');setButtons([{text:'Начать',action:newGame}]);}}
        function newGame(){player={name:prompt('Имя героя:','Герой')||'Герой',level:1,wins:0,maxHp:100,hp:100,attack:15,defense:8,coins:100,keys:0,cards:[],conquered:[],favorite:null,introDone:false};bosses={"Кайрос":{defeated:false,rel:0,dateCount:0},"Зейн":{defeated:false,rel:0,dateCount:0},"Люциан":{defeated:false,rel:0,dateCount:0}};defeatedMonsters=[];defeatedElites=[];defeatedBosses=[];setText('⚡ '+player.name+', добро пожаловать!');updateUI();setButtons([{text:'Вперёд!',action:()=>{player.introDone?mainMenu():introScene();}}]);}
        function setButtons(btns){let d=document.getElementById('buttons');d.innerHTML='';d.className='menu-buttons';btns.forEach(b=>{let x=document.createElement('button');x.textContent=b.text;x.onclick=b.action;x.className='menu-btn';d.appendChild(x);});}
        function init(){let bar=document.getElementById('loadingBar'),w=0;let iv=setInterval(()=>{w+=Math.floor(Math.random()*15)+5;if(w>=100){w=100;clearInterval(iv);setTimeout(()=>{document.getElementById('loadingScreen').classList.add('hidden');setTimeout(start,800);},400);}bar.style.width=w+'%';},200);}
        init();
    </script>
</body>
</html>
