        function startElite(){if(!canFightElite()){setText('🔒 11 ур.');setButtons([{text:'Назад',action:mainMenu}]);return;}let m=eliteData[Math.floor(Math.random()*4)];startBattle(m.name,m.hp,m.atk,'elite',m.coins,m.img);}
        // НОВЫЙ ДЖОЙСТИК
        function joy(cr){updateUI();updateEnemyBar();let h='<div class="joystick-container"><div class="joy-empty"></div><button class="joy-btn" onclick="atk('+cr+')">⚔️</button><div class="joy-empty"></div>';h+='<button class="joy-btn" onclick="flee()">🏃</button><button class="joy-btn" onclick="block('+cr+')">🛡️</button><button class="joy-btn" onclick="heal('+cr+')">💚</button>';h+='<div class="joy-empty"></div><button class="joy-btn" onclick="satk('+cr+')">💥</button><div class="joy-empty"></div></div>';document.getElementById('joystickArea').innerHTML=h;document.getElementById('buttons').innerHTML='';}
        function atk(cr){let d=Math.max(1,player.attack+rand(-3,5));enemyHp-=d;addText('⚔️ -'+d);updateEnemyBar();if(enemyHp<=0){win(cr);return;}eturn(cr);}
        function satk(cr){if(chance(0.7)){let d=Math.max(1,player.attack*2);enemyHp-=d;addText('💥 -'+d);}else{addText('💨 Промах!');}updateEnemyBar();if(enemyHp<=0){win(cr);return;}eturn(cr);}
        function block(cr){isBlocking=true;addText('🛡️ Блок!');eturn(cr);}
        function heal(cr){let h=Math.floor(player.maxHp*0.2);player.hp=Math.min(player.maxHp,player.hp+h);addText('💚 +'+h);updateUI();eturn(cr);}
        function flee(){if(chance(0.5)){addText('🏃 Сбежал!');clearJoystick();hideEnemyBar();hidePortrait();enemyHp=0;mainMenu();}else{addText('Не вышло!');eturn(0);}}
        function eturn(cr){let d=Math.max(1,enemyAttack+rand(-2,4)-player.defense);if(isBlocking){d=Math.floor(d/2);isBlocking=false;}player.hp-=d;addText('💢 '+enemyName+' -'+d);updateUI();if(player.hp<=0){player.hp=Math.floor(player.maxHp/2);addText('💀 Поражение...');clearJoystick();hideEnemyBar();hidePortrait();enemyHp=0;mainMenu();return;}joy(cr);}
        function win(cr){addText('🎉 ПОБЕДА!');addWin();if(cr>0){player.coins+=cr;addText('💰 +'+cr);}if(battleType==='monster'&&!defeatedMonsters.includes(enemyName))defeatedMonsters.push(enemyName);if(battleType==='elite'&&!defeatedElites.includes(enemyName))defeatedElites.push(enemyName);if(battleType==='boss'&&!defeatedBosses.includes(enemyName))defeatedBosses.push(enemyName);clearJoystick();hideEnemyBar();if(battleType!=='boss')hidePortrait();enemyHp=0;updateUI();setButtons([{text:'Продолжить',action:mainMenu}]);checkAchievements();}
        function chooseBoss(){clearJoystick();if(!canFightBoss()){setText('🔒 21 ур.');setButtons([{text:'Назад',action:mainMenu}]);return;}if(player.cards.length===0){setText('🔒 Нет карт!');setButtons([{text:'Назад',action:mainMenu}]);return;}let avail=player.cards.filter(b=>!bosses[b].defeated);if(avail.length===0){setText('Все побеждены!');setButtons([{text:'Назад',action:mainMenu}]);return;}let btns=avail.map(x=>({text:x,action:()=>bossBattle(x)}));btns.push({text:'Назад',action:mainMenu});setText('Выбери:');setButtons(btns);}
        function bossBattle(n){currentBoss=n;player.hp=player.maxHp;bossPhase=1;isBlocking=false;let d=bossData[n];enemyName=n;enemyHp=d.hp;enemyMaxHp=d.hp;enemyAttack=d.atk;phaseThreshold=Math.floor(d.hp*0.5);battleType='boss';setBg(n);showImg(d.img);updateEnemyBar();setText('👑 '+n);bossJoy();}
        function bossJoy(){updateUI();updateEnemyBar();let h='<div class="joystick-container"><div class="joy-empty"></div><button class="joy-btn" onclick="bAtk()">⚔️</button><div class="joy-empty"></div>';h+='<button class="joy-btn" onclick="bHeal()">💚</button><button class="joy-btn" onclick="bBlock()">🛡️</button><button class="joy-btn" onclick="bHeal()">💚</button>';h+='<div class="joy-empty"></div><button class="joy-btn" onclick="bSatk()">💥</button><div class="joy-empty"></div></div>';document.getElementById('joystickArea').innerHTML=h;document.getElementById('buttons').innerHTML='';}
        function bAtk(){let d=Math.max(1,player.attack+rand(-5,8));enemyHp-=d;addText('⚔️ -'+d);updateEnemyBar();if(enemyHp<=0){bWin();return;}bTurn();}
        function bSatk(){if(chance(0.6)){let d=Math.max(1,player.attack*2);enemyHp-=d;addText('💥 -'+d);}else{addText('💨 Промах!');}updateEnemyBar();if(enemyHp<=0){bWin();return;}bTurn();}
        function bBlock(){isBlocking=true;addText('🛡️ Блок!');bTurn();}
        function bHeal(){let h=Math.floor(player.maxHp*0.25);player.hp=Math.min(player.maxHp,player.hp+h);addText('💚 +'+h);updateUI();bTurn();}
        function bTurn(){let d=Math.max(1,enemyAttack+rand(-5,20)-player.defense);if(isBlocking){d=Math.floor(d/2);isBlocking=false;}player.hp-=d;addText('💢 '+currentBoss+' -'+d);updateUI();if(enemyHp<=phaseThreshold&&bossPhase===1){bossPhase=2;enemyAttack+=20;addText('⚡ Ярость!');}if(player.hp<=0){player.hp=Math.floor(player.maxHp/2);addText('💀 Поражение...');clearJoystick();hideEnemyBar();hidePortrait();enemyHp=0;mainMenu();return;}bossJoy();}
        function bWin(){addText('🎉 ПОБЕДА!');bosses[currentBoss].defeated=true;if(!player.conquered.includes(currentBoss))player.conquered.push(currentBoss);if(!player.favorite)player.favorite=currentBoss;if(!defeatedBosses.includes(currentBoss))defeatedBosses.push(currentBoss);addWin();player.coins+=80;player.relPoints+=20;addText('+80💰 +20💕');clearJoystick();hideEnemyBar();enemyHp=0;updateUI();setButtons([{text:'Продолжить',action:mainMenu}]);checkAchievements();}
        function chooseRel(){clearJoystick();if(player.conquered.length===0){setText('Победи босса!');setButtons([{text:'Назад',action:mainMenu}]);return;}let b=player.conquered.map(x=>({text:x+' (ур.'+Math.min(5,Math.floor(bosses[x].rel/70)+1)+')',action:()=>relMenu(x)}));b.push({text:'Назад',action:mainMenu});setText('💕 Отношения | 💕'+player.relPoints);setButtons(b);}
        function relMenu(n){clearJoystick();setBg(n);showImg(bossImages[n]);let b=bosses[n],lvl=Math.min(5,Math.floor(b.rel/70)+1);let msg='💕 '+n+' | Ур.'+lvl+'/5 | '+b.rel+'/'+(lvl*70);if(b.rel>=350)msg+='\n❤️ Макс!';setText(msg);updateUI();let btns=[];btns.push({text:'💬 Поговорить (10💕)',action:()=>relAct(n,'talk')});btns.push({text:'🤝 Прикоснуться (20💕)',action:()=>relAct(n,'touch')});btns.push({text:'🎁 Подарок (30💕)',action:()=>relGift(n)});if(lvl>=4)btns.push({text:'💖 Свидание (50💕)',action:()=>relDate(n)});if(b.rel>=350)btns.push({text:'🌙 Финальная сцена',action:()=>relFinal(n)});if(player.favorite===n)btns.push({text:'💔 Убрать',action:()=>{player.favorite=null;mainMenu();}});else btns.push({text:'❤️ В избранное',action:()=>{player.favorite=n;mainMenu();}});btns.push({text:'Назад',action:chooseRel});setButtons(btns);}
        function relAct(n,t){let costs={talk:10,touch:20},gains={talk:5,touch:10};if(player.relPoints<costs[t]){setText('Нужно '+costs[t]+'💕!');return;}player.relPoints-=costs[t];bosses[n].rel=Math.min(350,bosses[n].rel+gains[t]);setText('+'+gains[t]+' очков!');updateUI();setButtons([{text:'OK',action:()=>relMenu(n)}]);}
        function relGift(n){clearJoystick();if(player.relPoints<30){setText('Нужно 30💕!');return;}let g=giftData[n];let h='🎁 ПОДАРОК (30💕)<br><br>';h+='<div class="gift-compact">';h+='<div style="text-align:center;"><div class="gift-card"><img src="'+g[0].img+'"></div><br>'+g[0].name+'<br><button class="menu-btn" onclick="relGiftOk(\''+n+'\',0)">Выбрать</button></div>';h+='<div style="text-align:center;"><div class="gift-card"><img src="'+g[1].img+'"></div><br>'+g[1].name+'<br><button class="menu-btn" onclick="relGiftOk(\''+n+'\',1)">Выбрать</button></div>';h+='</div><br><button class="menu-btn" onclick="relMenu(\''+n+'\')">Назад</button>';setText(h);setButtonsHTML('');}
        function relGiftOk(n,idx){player.relPoints-=30;bosses[n].rel=Math.min(350,bosses[n].rel+20);let g=giftData[n][idx];let h='🎁 Вручён!<br><br><div class="gift-ok-card"><img src="'+g.img+'"></div><br>'+g.name+'<br>+20 очков!';setText(h);updateUI();setButtons([{text:'OK',action:()=>relMenu(n)}]);}
        function relDate(n){if(player.relPoints<50){setText('Нужно 50💕!');return;}player.relPoints-=50;bosses[n].rel=Math.min(350,bosses[n].rel+50);bosses[n].dateCount++;let d=dates[n][Math.min(bosses[n].dateCount,2)];playDate();setBgDirect(d.bg);showImg(d.img);setText('💖 СВИДАНИЕ #'+bosses[n].dateCount+'\n\n'+d.t+'\n\n+50 очков!');updateUI();setButtons([{text:'Прекрасно...',action:()=>{stopDate();playBG();relMenu(n);}}]);}
        function relFinal(n){playDate();setBg(n);showImg(bossImages[n]);setText('🌙 ФИНАЛЬНАЯ СЦЕНА\n\n'+finalScenes[n]);setButtons([{text:'❤️',action:()=>{stopDate();playBG();relMenu(n);}}]);checkAchievements();}
        function shop(){clearJoystick();setBg('menu');setText('🏪 | 💰'+player.coins);setButtons([{text:'🧪 +50 HP (80💰)',action:()=>{if(player.coins>=80){player.coins-=80;player.hp=Math.min(player.maxHp,player.hp+50);}shop();}},{text:'⚗️ +10 Атк (120💰)',action:()=>{if(player.coins>=120){player.coins-=120;player.attack+=10;}shop();}},{text:'💕 +20 очков (100💰)',action:()=>{if(player.coins>=100){player.coins-=100;player.relPoints+=20;}shop();}},{text:'Назад',action:mainMenu}]);}
        function stats(){clearJoystick();setBg('menu');let m='📊 СТАТЫ\nУр.'+player.level+' | HP:'+player.maxHp+' | Атк:'+player.attack+'\n💰'+player.coins+' | 💕'+player.relPoints+' | 🔑'+player.keys+'\n🏆 Достижений: '+player.achievements.length+'/3\nЛокаций: '+locDefeated.filter(x=>x).length+'/4\n\n';if(player.conquered.length>0){m+='👑 БОССЫ:\n';player.conquered.forEach(b=>{m+=b+': '+bosses[b].rel+'/350\n';});}setText(m);setButtons([{text:'Назад',action:mainMenu}]);}
        function getSaves(){let s=localStorage.getItem('blFantasySaves');if(!s)return{};try{return JSON.parse(s);}catch(e){return{};}}
        function saveSaves(s){try{localStorage.setItem('blFantasySaves',JSON.stringify(s));}catch(e){}}
        function saveMenu(){clearJoystick();let s=getSaves(),h='💾 СОХРАНИТЬ<br><br>';for(let i=1;i<=3;i++)h+='<button class="save-slot-btn" onclick="saveSlot('+i+')">Слот '+i+': '+(s['slot'+i]?s['slot'+i].name:'Пусто')+'</button>';h+='<br><button class="menu-btn" onclick="showSettings()">Назад</button>';setText(h);setButtonsHTML('');}
        function saveSlot(n){let nm=prompt('Название:','Слот '+n);if(!nm)return;let s=getSaves();s['slot'+n]={name:nm,player:JSON.parse(JSON.stringify(player)),bosses:JSON.parse(JSON.stringify(bosses)),dM:[...defeatedMonsters],dE:[...defeatedElites],dB:[...defeatedBosses],locDefeated:[...locDefeated]};saveSaves(s);setText('💾 '+nm);setButtons([{text:'OK',action:mainMenu}]);}
        function loadMenu(){clearJoystick();let s=getSaves(),h='📂 ЗАГРУЗИТЬ<br><br>',a=false;for(let i=1;i<=3;i++){if(s['slot'+i]){a=true;h+='<button class="save-slot-btn" onclick="loadSlot('+i+')">Слот '+i+': '+s['slot'+i].name+'</button>';}else h+='<div class="save-slot-btn" style="color:#504050;">Слот '+i+': Пусто</div>';}if(!a)h+='<br>Нет сохранений!';h+='<br><button class="menu-btn" onclick="showSettings()">Назад</button>';setText(h);setButtonsHTML('');}
        function loadSlot(n){let s=getSaves()['slot'+n];if(!s){setText('Слот пуст!');return;}player=JSON.parse(JSON.stringify(s.player));bosses=JSON.parse(JSON.stringify(s.bosses));defeatedMonsters=(s.dM||[]).slice();defeatedElites=(s.dE||[]).slice();defeatedBosses=(s.dB||[]).slice();locDefeated=(s.locDefeated||[false,false,false,false]).slice();player.introDone=true;enemyHp=0;hideEnemyBar();hidePortrait();clearJoystick();setBg('menu');updateUI();setText('📂 '+s.name+' загружено!');setButtons([{text:'Играть!',action:mainMenu}]);}
        function newGameConfirm(){clearJoystick();setText('⚠️ Начать новую игру?');setButtons([{text:'✅ Да',action:newGame},{text:'❌ Нет',action:mainMenu}]);}
        function start(){clearJoystick();let s=getSaves(),has=Object.keys(s).length>0;setBg('menu');updateUI();if(has){setText('📂 Сохранения найдены.');setButtons([{text:'📂 Загрузить',action:loadMenu},{text:'🆕 Новая',action:newGameConfirm}]);}else{setText('🔥 BL ФЕНТЕЗИ 🔥');setButtons([{text:'Начать',action:newGame}]);}}
        function newGame(){player={name:prompt('Имя:','Герой')||'Герой',level:1,wins:0,maxHp:100,hp:100,attack:15,defense:8,coins:100,relPoints:0,keys:0,cards:[],conquered:[],favorite:null,introDone:false,lastDaily:null,sparkMet:[],chatDate:null,chatsLeft:5,musicOn:true,achievements:[]};bosses={"Кайрос":{defeated:false,rel:0,dateCount:0},"Зейн":{defeated:false,rel:0,dateCount:0},"Люциан":{defeated:false,rel:0,dateCount:0}};defeatedMonsters=[];defeatedElites=[];defeatedBosses=[];locDefeated=[false,false,false,false];setText('⚡ '+player.name+', добро пожаловать!');updateUI();setButtons([{text:'Вперёд!',action:()=>{player.introDone?mainMenu():introScene();}}]);}
        function setButtons(btns){let d=document.getElementById('buttons');d.innerHTML='';d.className='menu-buttons';btns.forEach(b=>{let x=document.createElement('button');x.textContent=b.text;x.onclick=b.action;x.className='menu-btn';d.appendChild(x);});}
        function init(){let bar=document.getElementById('loadingBar'),w=0;let iv=setInterval(()=>{w+=Math.floor(Math.random()*15)+5;if(w>=100){w=100;clearInterval(iv);setTimeout(()=>{document.getElementById('loadingScreen').classList.add('hidden');setTimeout(start,800);},400);}bar.style.width=w+'%';},200);}
        init();
    </script>
</body>
</html>
